# ============================================================
# Nginx Reverse Proxy Configuration for Halal Check API
# ============================================================
# Place this file as /etc/nginx/conf.d/default.conf
# or mount it in docker-compose: ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
#
# For SSL: place your certificates in ./ssl/ and uncomment the
# SSL server block below.
# ============================================================

upstream halal_api {
    server app:8000;
}

# Rate limiting zone (must be in http context, not inside server block)
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

