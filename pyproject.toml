[tool.ruff]
target-version = "py312"
line-length = 100
src = ["app", "data", "tests"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
]
ignore = ["E501"]  # line length handled by formatter

[tool.ruff.lint.isort]
known-first-party = ["app", "data"]

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
ignore_missing_imports = true
check_untyped_defs = true
namespace_packages = true

[[tool.mypy.overrides]]
module = ["tests.*"]
disallow_untyped_defs = false

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "slow: marks tests as slow (network-dependent)",
]
addopts = "-m 'not slow' --tb=short"

[tool.bandit]
exclude_dirs = ["tests"]
skips = ["B101", "B608"]

[tool.coverage.run]
source = ["app", "data"]
omit = [
    "tests/*",
    "data/generate_products.py",
    "data/generate_products_extra.py",
    "data/generate_products_final.py",
]

[tool.coverage.report]
fail_under = 70
show_missing = true
