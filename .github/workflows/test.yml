name: Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run ruff check
        run: ruff check app/ data/ tests/

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run mypy
        run: mypy app/ data/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Bandit scan
        run: bandit -r app/ data/ -f json -o bandit-report.json || true
      - name: Check bandit results
        run: |
          if [ -f bandit-report.json ]; then
            HIGH=$(python3 -c "import json; r=json.load(open('bandit-report.json')); print(sum(1 for x in r.get('results',[]) if x.get('issue_severity')=='HIGH'))")
            if [ "$HIGH" -gt 0 ]; then echo "FAIL: $HIGH HIGH severity issues"; exit 1; fi
          fi
      - name: Safety check (dependency vulnerabilities)
        run: safety check --json || true
        continue-on-error: true  # Don't block on known upstream issues

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run tests with coverage
        run: |
          pytest -m "not slow" --cov --cov-report=term-missing --cov-report=xml:coverage.xml -v
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
